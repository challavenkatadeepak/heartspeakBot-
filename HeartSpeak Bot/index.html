<!DOCTYPE html>
<html>
<head>

<title>HeartSpeak Bot ❤️</title>

<style>

body{
font-family: "Segoe UI", sans-serif;
background: radial-gradient(circle at top,#1e2a24,#0f1412);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.chat-container{
width:420px;
height:640px;
background:rgba(24,34,30,0.9);
backdrop-filter: blur(12px);
border-radius:20px;
box-shadow:0 0 25px rgba(120,160,140,0.25);
display:flex;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(140,180,160,0.2);
}

.chat-header{
background:linear-gradient(90deg,#6f9f8f,#89b3a5);
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 0 15px rgba(120,160,140,0.4);
}

.chat-messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:75%;
padding:12px 16px;
border-radius:18px;
font-size:14px;
animation:fadeIn 0.3s ease;
}

.user{
background:#6f9f8f;
align-self:flex-end;
border-bottom-right-radius:4px;
box-shadow:0 0 6px rgba(140,180,160,0.3);
}

.bot{
background:#2a3a34;
border-bottom-left-radius:4px;
box-shadow:0 0 6px rgba(255,255,255,0.05);
}

.bot-row{
display:flex;
align-items:flex-start;
gap:8px;
}

.bot-avatar{
width:30px;
height:30px;
border-radius:50%;
background:#6f9f8f;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
box-shadow:0 0 8px rgba(120,160,140,0.4);
}

.chat-input{
display:flex;
padding:12px;
gap:10px;
background:#18221e;
border-top:1px solid rgba(255,255,255,0.05);
}

.chat-input input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#24332d;
color:white;
outline:none;
font-size:14px;
}

.chat-input button{
background:linear-gradient(90deg,#6f9f8f,#89b3a5);
border:none;
color:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.chat-input button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(120,160,140,0.4);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">
HeartSpeak Bot ❤️
</div>

<div id="messages" class="chat-messages"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask for a motivational quote..." onkeypress="handleKey(event)">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function addUserMessage(text){
let div=document.createElement("div")
div.className="message user"
div.innerText=text
messages.appendChild(div)
scrollDown()
}

function addBotMessage(text){
let row=document.createElement("div")
row.className="bot-row"

let avatar=document.createElement("div")
avatar.className="bot-avatar"
avatar.innerText="❤️"

let msg=document.createElement("div")
msg.className="message bot"
msg.innerText=text

row.appendChild(avatar)
row.appendChild(msg)

messages.appendChild(row)
scrollDown()
}

function scrollDown(){
messages.scrollTop=messages.scrollHeight
}

function send(){

let input=document.getElementById("msg")
let text=input.value

if(text.trim()=="") return

addUserMessage(text)

input.value=""

fetch("http://localhost:5005/webhooks/rest/webhook",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sender:"user",
message:text
})
})

.then(r=>r.json())
.then(data=>{
data.forEach(e=>{
addBotMessage(e.text)
})
})

}

function handleKey(e){
if(e.key==="Enter"){
send()
}
}

</script>

</body>
</html>
